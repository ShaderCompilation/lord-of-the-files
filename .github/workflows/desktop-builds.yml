name: Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            artifact: lord-of-the-files-linux
          - name: Windows
            os: windows-latest
            artifact: lord-of-the-files-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libdbus-1-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        run: |
          APP_VERSION=$(node -p 'require("./src-tauri/tauri.conf.json").version')
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Type-check frontend
        run: pnpm exec tsc --noEmit

      - name: Test frontend
        run: pnpm test:frontend

      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri desktop bundle
        run: pnpm tauri build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ env.APP_VERSION }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
