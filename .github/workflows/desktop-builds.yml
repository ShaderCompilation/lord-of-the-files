name: Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AppImage
            os: ubuntu-22.04
            artifact: lord-of-the-files-linux-appimage
            rust_targets: ""
            build_args: --bundles appimage
            bundle_path: src-tauri/target/release/bundle/appimage/*.AppImage
          - name: macOS
            os: macos-15
            artifact: lord-of-the-files-macos
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
            build_args: --target universal-apple-darwin
            bundle_path: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
          - name: Windows
            os: windows-latest
            artifact: lord-of-the-files-windows
            rust_targets: ""
            build_args: ""
            bundle_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libdbus-1-dev \
            libfuse2

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install extra Rust targets
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        run: |
          APP_VERSION=$(node -p 'require("./src-tauri/tauri.conf.json").version')
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Check release tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [ "v${APP_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app version v${APP_VERSION}" >&2
            exit 1
          fi

      - name: Type-check frontend
        run: pnpm exec tsc --noEmit

      - name: Test frontend
        run: pnpm test:frontend

      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri desktop bundle
        run: pnpm tauri build --ci ${{ matrix.build_args }}

      - name: Show generated desktop bundles
        run: find src-tauri/target -path '*/release/bundle/*' -type f -print

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ env.APP_VERSION }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: find release-assets -maxdepth 6 -type f -print

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
